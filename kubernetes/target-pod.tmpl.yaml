# Ephemeres SSH-Zielsystem fuer einen einzelnen Lab-Lauf.
# Wird von scripts/run.sh per envsubst gerendert und imperativ
# (kubectl apply) erzeugt - bewusst NICHT von ArgoCD verwaltet, weil
# der Reconcile-Loop gegen On-demand-Pods arbeiten wuerde.
#
# Schema v2: generischer Bootstrap. Der Zielzustand kommt aus dem pro Lauf
# gemounteten Szenario-Verzeichnis (/etc/thesis): setup.sh etabliert ihn,
# audit_sudoers ist die read-only Kommando-Whitelist dieses Szenarios.
#
# Bootstrap inline (apt install openssh-server) statt vorgebautem Image:
# laesst den Lauf ohne Registry/imagePullSecret starten. Fuer die
# eigentliche Evaluation auf das gepinnte Image aus images/ubuntu-sshd/
# umstellen (Reproduzierbarkeit, kein apt-Drift) - siehe images/PINNING.md.
apiVersion: v1
kind: Pod
metadata:
  name: ${POD_NAME}
  namespace: ${NAMESPACE}
  labels:
    thesis.pybay.de/run-id: "${RUN_ID_LABEL}"
    thesis.pybay.de/scenario: "${SCENARIO}"
    thesis.pybay.de/requirement: "${REQ_ID_LABEL}"
    thesis.pybay.de/variant: "${VARIANT_LABEL}"
    thesis.pybay.de/ergebnisklasse: "${ERGEBNISKLASSE_LABEL}"
  annotations:
    thesis.pybay.de/run-id-full: "${RUN_ID}"
    thesis.pybay.de/requirement: "${REQ_ID}"
    thesis.pybay.de/ground-truth-sha256: "${GT_HASH}"
    thesis.pybay.de/state-sha256: "${STATE_HASH}"
spec:
  restartPolicy: Never
  # Node-Pinning auf den Lab-Node (Substrat-Vertrag). Entfaellt je Block,
  # wenn LAB_NODE_SELECTOR="" bzw. LAB_TOLERATION="" (siehe scripts/lib.sh).
  # BEGIN node-selector
  nodeSelector:
    ${LAB_NODE_KEY}: "${LAB_NODE_VALUE}"
  # END node-selector
  # BEGIN toleration
  tolerations:
    - key: ${LAB_TOL_KEY}
      operator: Equal
      value: "${LAB_TOL_VALUE}"
      effect: NoSchedule
  # END toleration
  containers:
    - name: target
      image: ${IMAGE}
      command: ["/bin/bash", "-c"]
      args:
        - |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          # apt-Listen IMMER bereitstellen: szenario-eigene setup.sh installieren
          # ggf. Zusatzpakete (z.B. libpam-pwquality in SYS.1.1.A2-authpolicy). Mit
          # gepinntem Image fehlen die Listen sonst (Dockerfile loescht sie) -> solche
          # Installs scheitern still (|| true) und verfaelschen den Zielzustand.
          # sshd/sudo bringt das gepinnte Image schon mit -> nur Install guarden.
          apt-get update -qq
          if [ ! -x /usr/sbin/sshd ]; then
            apt-get install -y -qq openssh-server sudo >/dev/null
          fi
          id audit >/dev/null 2>&1 || useradd -m -s /bin/bash audit
          install -d -m 700 -o audit -g audit /home/audit/.ssh
          install -m 600 -o audit -g audit /etc/thesis-auth/authorized_keys /home/audit/.ssh/authorized_keys
          # Sichere Default-sshd_config: Pubkey-Login fuer audit, kein Passwort.
          # UsePAM yes ist NOETIG: das frisch angelegte audit-Konto hat ein
          # gesperrtes Passwort (!); ohne PAM wertet sshd es als "invalid user"
          # und lehnt auch Pubkey-Auth ab. setup.sh darf die Datei
          # szenariospezifisch ueberschreiben (z.B. A8).
          cat > /etc/ssh/sshd_config <<'SSHD'
          Port 22
          PubkeyAuthentication yes
          PasswordAuthentication no
          KbdInteractiveAuthentication no
          UsePAM yes
          PermitRootLogin no
          AuthorizedKeysFile /home/audit/.ssh/authorized_keys
          Subsystem sftp /usr/lib/openssh/sftp-server
          SSHD
          chmod 644 /etc/ssh/sshd_config
          # read-only Tool-Layer: szenario-eigene Kommando-Whitelist (DZ6)
          install -m 440 /etc/thesis/audit_sudoers /etc/sudoers.d/audit
          # Zielzustand etablieren (laeuft als root im Bootstrap)
          bash /etc/thesis/setup.sh
          ssh-keygen -A
          mkdir -p /run/sshd
          echo "[target] sshd startet (variant=${VARIANT}, ergebnisklasse=${ERGEBNISKLASSE_LABEL}, run=${RUN_ID})"
          exec /usr/sbin/sshd -D -e
      ports:
        - name: ssh
          containerPort: 22
      readinessProbe:
        tcpSocket:
          port: 22
        initialDelaySeconds: 10
        periodSeconds: 5
        failureThreshold: 40        # apt install kann dauern (~bis 200s)
      volumeMounts:
        - name: scenario
          mountPath: /etc/thesis
          readOnly: true
        - name: authorized-keys
          mountPath: /etc/thesis-auth
          readOnly: true
  volumes:
    - name: scenario
      configMap:
        name: ${CM_NAME}
        defaultMode: 0600          # root liest/fuehrt aus; audit sieht setup.sh/sudoers-Inhalt nicht (Anti-Leakage)
    - name: authorized-keys
      secret:
        secretName: ${SECRET_NAME}
