# Pruefagent als ephemerer k8s-Job (Schema v2, in-cluster, laptop-frei).
# Von scripts/run.sh per envsubst gerendert und imperativ erzeugt.
#
# DZ2 (Leakage-Freiheit) per Konstruktion ueber Dateisystem-Isolation:
#   - KEIN Repo-/GT-/Host-Mount. Die Ground Truth liegt nur operator-seitig
#     im Dateisystem, nie in einem Pod/einer ConfigMap.
#   - automountServiceAccountToken: false -> kein Zugriff auf die k8s-API
#     (kann keine fremden ConfigMaps/Secrets lesen).
#   - Gemountet wird nur: per-run SSH-Key (Secret) + Pruef-Prompt ohne GT (CM).
apiVersion: batch/v1
kind: Job
metadata:
  name: ${JOB_NAME}
  namespace: ${NAMESPACE}
  labels:
    thesis.pybay.de/run-id: "${RUN_ID_LABEL}"
    thesis.pybay.de/requirement: "${REQ_ID_LABEL}"
    thesis.pybay.de/ergebnisklasse: "${ERGEBNISKLASSE_LABEL}"
    thesis.pybay.de/role: "agent"
spec:
  backoffLimit: 0                 # kein Retry: ein Lauf = ein Versuch (pass^k zaehlt extern)
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        thesis.pybay.de/run-id: "${RUN_ID_LABEL}"
        thesis.pybay.de/role: "agent"
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      # Pull-Credentials der Registry (einmalig im NS angelegt). Entfaellt,
      # wenn AGENT_PULL_SECRET="" (oeffentlich ziehbares AGENT_IMAGE).
      # BEGIN pull-secret
      imagePullSecrets:
        - name: ${AGENT_PULL_SECRET}
      # END pull-secret
      # Node-Pinning auf den Lab-Node (Substrat-Vertrag). Entfaellt je Block,
      # wenn LAB_NODE_SELECTOR="" bzw. LAB_TOLERATION="" (siehe scripts/lib.sh).
      # BEGIN node-selector
      nodeSelector:
        ${LAB_NODE_KEY}: "${LAB_NODE_VALUE}"
      # END node-selector
      # BEGIN toleration
      tolerations:
        - key: ${LAB_TOL_KEY}
          operator: Equal
          value: "${LAB_TOL_VALUE}"
          effect: NoSchedule
      # END toleration
      containers:
        - name: agent
          image: ${AGENT_IMAGE}
          # IfNotPresent: erlaubt, das Image vorab in die containerd der
          # Lab-Node zu importieren. Bei :latest waere der Default 'Always'
          # und wuerde trotz lokalem Image die Registry anfragen -- die ist
          # fuer grosse Blobs unzuverlaessig.
          imagePullPolicy: IfNotPresent
          env:
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef: { name: claude-oauth, key: token }
            # Lauf-Telemetrie (DZ7) an eine OTLP-Senke. Der ganze Block
            # entfaellt, wenn OTEL_ENDPOINT="" (dann auch kein otel-auth-Secret).
            # BEGIN otel
            - name: CLAUDE_CODE_ENABLE_TELEMETRY
              value: "1"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "${OTEL_ENDPOINT}"
            - name: OTEL_EXPORTER_OTLP_HEADERS
              valueFrom:
                secretKeyRef: { name: otel-auth, key: authorization }
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "${OTEL_ATTRS}"
            - name: CLAUDE_CODE_ENHANCED_TELEMETRY_BETA
              value: "1"
            - name: OTEL_LOG_USER_PROMPTS
              value: "1"
            - name: OTEL_LOG_TOOL_DETAILS
              value: "1"
            - name: OTEL_LOG_TOOL_CONTENT
              value: "1"
            # END otel
            # Modell-Pin (DZ5/DZ9). Wird von run.sh entfernt, wenn AGENT_MODEL leer ist.
            - name: ANTHROPIC_MODEL
              value: "${AGENT_MODEL}"
            # Hintergrund-/Small-Fast-Modell auf den Pin ziehen -> keine Haiku-Calls,
            # modelUsage enthaelt nur den Pin (DZ5). Wird von run.sh mitentfernt, wenn
            # AGENT_MODEL leer ist. (Loest ANTHROPIC_SMALL_FAST_MODEL ab.)
            - name: ANTHROPIC_DEFAULT_HAIKU_MODEL
              value: "${AGENT_MODEL}"
            # Reasoning-Effort-Pin (DZ5). Vom Entrypoint als 'claude -p --effort'
            # gesetzt; Default in lib.sh = high.
            - name: AGENT_EFFORT
              value: "${AGENT_EFFORT}"
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
          volumeMounts:
            - name: agent-key
              mountPath: /etc/agent-key
              readOnly: true
            - name: agent-prompt
              mountPath: /etc/agent-prompt
              readOnly: true
      volumes:
        - name: agent-key
          secret:
            secretName: ${AGENT_KEY_SECRET}
            defaultMode: 0444       # non-root 'agent' liest, Entrypoint kopiert auf 600
        - name: agent-prompt
          configMap:
            name: ${AGENT_PROMPT_CM}
            defaultMode: 0444
