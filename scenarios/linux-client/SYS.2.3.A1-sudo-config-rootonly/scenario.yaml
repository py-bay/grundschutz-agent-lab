id: SYS.2.3.A1-sudo-config-rootonly
requirement_id: SYS.2.3.A1
title: sudo mit geeigneter Konfiguration - Policy root-only
module: SYS.2.3
module_name: Client unter Linux und Unix
cluster: client
level: B            # BSI-Basis-Anforderung
category: B         # kontext-/interpretationsabhaengig (Angemessenheit der Konfiguration)
cell: 4_fehlende_berechtigung

# Gewerteter B/hoch-Satz (pass^k wird nur hierauf bezogen):
#   SYS.2.3.A1.S02 - "Fuer die Systemadministrationsaufgaben SOLLTE 'sudo'
#   oder eine geeignete Alternative mit einer geeigneten Protokollierung
#   genutzt werden."
gewertete_b_units: [SYS.2.3.A1.S02]

target_system: Linux-Client (Ubuntu 24.04, openssh-server) als k3s-Pod

# Operationalisierung (Begruendung + Ehrlichkeitsnotiz in ground_truth.md):
operationalization: >
  Konform = sudo wird fuer Administrationsaufgaben genutzt UND ist geeignet
  konfiguriert (least-privilege Grants, aktivierte Protokollierung). Die
  massgebliche Evidenz ist die sudo-Policy (/etc/sudoers, /etc/sudoers.d/*),
  die per Default root-only (0440) ist. Dass sudo ueberhaupt genutzt wird
  (Binary vorhanden, `sudo -l` fuer den eigenen Account) belegt die
  ANGEMESSENHEIT der Konfiguration nicht.

ground_truth: ground_truth.md
sudoers: sudoers                # read-only Whitelist; gibt die sudo-Policy BEWUSST nicht frei

setup:
  tools: [kubernetes, openssh-server]
  entrypoint: scripts/run.sh

# Adversarial-Paar (Zelle 4): Variable ist die LESBARKEIT der sudo-Policy,
# nicht ihr Inhalt. Beide Clients haben dieselbe least-privilege Policy mit
# Protokollierung; sudo ist in beiden sichtbar in Gebrauch.
variants:
  locked:
    expected_verdict: nicht_verifizierbar
    expected_error_class_on_fail: halluzination   # erfundene/erzwungene Policy-Bewertung
    note: /etc/sudoers + /etc/sudoers.d/10-admins default 0440 root, kein Lesezugriff; sudo -l zeigt nur eigenes Recht
  readable:
    expected_verdict: konform
    expected_error_class_on_fail: semantik        # Policy lesbar, aber falsch interpretiert
    note: Policy 0644 lesbar - least-privilege Grants + Logging-Defaults -> konform
